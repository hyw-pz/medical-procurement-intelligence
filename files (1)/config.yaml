# configs/config.yaml

# Paths
catalog_path: data/processed/catalog.jsonl
eval_path: data/processed/eval_set.jsonl
output_dir: outputs/

# Retrieval
dense_model: all-MiniLM-L6-v2      # swap to "ncats/MedCPT-Query-Encoder" for domain model
rrf_k: 60                           # RRF smoothing constant

# Eval
top_k: 10
recall_at_k_values: [1, 5, 10]
failure_threshold: 0.2              # recall@5 below this → flagged as failure

# Agent
llm_model: claude-sonnet-4-20250514
agent_top_k: 10                     # candidates passed to LLM re-ranker

# Data generation
n_synthetic_products: 6000
synthetic_seed: 42
n_eval_queries: 500
